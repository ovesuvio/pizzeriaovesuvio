<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a0b10"/>
      <stop offset="0.5" stop-color="#4a1b2a"/>
      <stop offset="1" stop-color="#b45309"/>
    </linearGradient>
    <radialGradient id="spot" cx="60%" cy="35%" r="70%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur18" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="0.5" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="mic" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#94a3b8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>
  <rect width="1200" height="600" fill="url(#spot)"/>

  <g opacity="0.95" filter="url(#blur18)">
    <circle cx="180" cy="130" r="72" fill="#fbbf24" opacity="0.35"/>
    <circle cx="320" cy="220" r="55" fill="#fb7185" opacity="0.28"/>
    <circle cx="520" cy="140" r="80" fill="#f97316" opacity="0.26"/>
    <circle cx="680" cy="250" r="70" fill="#22c55e" opacity="0.16"/>
    <circle cx="860" cy="160" r="90" fill="#38bdf8" opacity="0.22"/>
    <circle cx="1020" cy="260" r="65" fill="#a78bfa" opacity="0.18"/>
    <circle cx="260" cy="420" r="88" fill="#fbbf24" opacity="0.18"/>
    <circle cx="520" cy="470" r="70" fill="#fb7185" opacity="0.14"/>
    <circle cx="880" cy="430" r="92" fill="#38bdf8" opacity="0.14"/>
    <circle cx="1060" cy="460" r="60" fill="#f97316" opacity="0.15"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="70" y="70" width="1060" height="460" rx="40" fill="#0b0b12" opacity="0.35"/>
  </g>

  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, 'Noto Sans', 'Liberation Sans', sans-serif">
    <g filter="url(#shadow)">
      <text x="130" y="185" font-size="72" font-weight="900" fill="url(#gold)" letter-spacing="0.5">
        Live-Musikabende
      </text>
      <text x="130" y="250" font-size="60" font-weight="900" fill="#f8fafc" opacity="0.95">
        in Planung
      </text>
    </g>

    <g opacity="0.98">
      <text x="130" y="320" font-size="28" font-weight="700" fill="#e2e8f0">
        Wir organisieren derzeit Live-Musikabende
      </text>
      <text x="130" y="362" font-size="28" font-weight="700" fill="#e2e8f0">
        und werden die Termine in Kürze bekannt geben,
      </text>
    </g>

    <g filter="url(#shadow)">
      <g transform="translate(840,155)">
        <rect x="50" y="0" width="140" height="230" rx="70" fill="url(#mic)"/>
        <rect x="60" y="18" width="120" height="190" rx="60" fill="#0b1220" opacity="0.25"/>
        <g opacity="0.65">
          <rect x="72" y="34" width="96" height="10" rx="5" fill="#0b1220"/>
          <rect x="72" y="58" width="96" height="10" rx="5" fill="#0b1220"/>
          <rect x="72" y="82" width="96" height="10" rx="5" fill="#0b1220"/>
          <rect x="72" y="106" width="96" height="10" rx="5" fill="#0b1220"/>
          <rect x="72" y="130" width="96" height="10" rx="5" fill="#0b1220"/>
          <rect x="72" y="154" width="96" height="10" rx="5" fill="#0b1220"/>
          <rect x="72" y="178" width="96" height="10" rx="5" fill="#0b1220"/>
        </g>
        <rect x="105" y="220" width="30" height="120" rx="15" fill="url(#mic)"/>
        <path d="M70 345 C70 390 170 390 170 345" fill="none" stroke="#e2e8f0" stroke-opacity="0.85" stroke-width="14" stroke-linecap="round"/>
        <rect x="82" y="390" width="76" height="20" rx="10" fill="#e2e8f0" opacity="0.85"/>
      </g>
    </g>

    <g opacity="0.85" filter="url(#shadow)">
      <text x="98" y="204" font-size="48" font-weight="900" fill="#a78bfa">♪</text>
      <text x="970" y="520" font-size="64" font-weight="900" fill="#fbbf24">♪</text>
      <text x="1050" y="510" font-size="54" font-weight="900" fill="#fb7185">♫</text>
      <text x="66" y="516" font-size="58" font-weight="900" fill="#fbbf24">♪</text>
    </g>
  </g>
</svg>
